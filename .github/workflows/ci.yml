name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # `pnpm/action-setup@v4` reads the version from `package.json#packageManager`
      # automatically when no `version` input is provided. Specifying a version
      # here in addition causes ERR_PNPM_BAD_PM_VERSION when the two differ.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5

      # See `check` job above — version is read from package.json#packageManager
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: |
          du -sh apps/web/.next
          echo "Build successful"
