name: Collect data (WHO DON + ECDC)

# Runs four times a day, plus on-demand. Times are in UTC.
# 04:00 UTC = 12:00 China time, 16:00 UTC = 00:00 next day China time.
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只抓取不写文件（true/false）'
        required: false
        default: 'false'

permissions:
  contents: write   # 需要 commit & push 数据更新

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install collector
        working-directory: services/collector
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        working-directory: services/collector
        run: pytest -q

      - name: Run collector
        working-directory: services/collector
        # main.py exit codes (see main.py docstring):
        #   0 = all sources OK
        #   1 = fatal — could not even start
        #   2 = partial — one or more sources failed, but valid output was
        #       still written (e.g. ECDC TLS handshake flaked, WHO DON OK)
        #
        # Treat code 2 as success-with-warning: the JSON files on disk are
        # internally consistent (builder.py preserves prior values when a
        # source is empty) and we want the commit & push step to still run
        # so the user sees the data update. Without this special-case, a
        # single ECDC blip every few weeks blocked all auto-updates.
        run: |
          set +e
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Collector ok."
            exit 0
          elif [ "$rc" -eq 2 ]; then
            echo "::warning title=Collector partial failure::main.py returned 2 — one or more sources failed but partial output was written. Continuing to commit & push."
            exit 0
          else
            echo "::error title=Collector fatal failure::main.py returned $rc"
            exit "$rc"
          fi

      - name: Detect changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain apps/web/src/data)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --porcelain apps/web/src/data
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        # The job's checkout happened ~3-7 minutes ago. If a human pushed in
        # that window (e.g. me committing a code fix), `git push` will fail
        # with a non-fast-forward error and the whole job is marked failed
        # — even though the data update itself is fine and merely needs to
        # be rebased on top of the human commit.
        #
        # We handle that race by retrying up to 3 times: each retry does
        # `git fetch + git rebase origin/main` (the bot's commit is a data-
        # only diff under apps/web/src/data, so it virtually never has
        # textual conflicts with code commits). 3 attempts is plenty —
        # if it still fails, something more serious is wrong and we should
        # surface the error.
        run: |
          git config user.name "hantawatch-bot"
          git config user.email "bot@bingduguancha.com"
          git add apps/web/src/data
          # Belt-and-braces against the rare case where `git status` saw
          # changes but `git add` ended up with an empty index (file mode
          # changes etc.). Better to skip than to create empty commits.
          if git diff --cached --quiet; then
            echo "Nothing staged after add; skipping commit."
            exit 0
          fi
          git commit -m "chore(data): auto-update from WHO/ECDC $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "::warning title=Push race::Attempt $attempt failed (non-fast-forward). Rebasing and retrying."
            # Drop and re-fetch in case the local main ref drifted.
            git fetch origin main
            # The bot's commit only touches apps/web/src/data — code commits
            # touch other paths. `rebase` here is essentially equivalent to
            # a fast-forward + replay of one commit, no conflicts expected.
            if ! git rebase origin/main; then
              echo "::error title=Rebase failed::Unexpected conflict during rebase. Aborting."
              git rebase --abort || true
              exit 1
            fi
          done
          echo "::error title=Push failed::Could not push after 3 attempts."
          exit 1

      - name: Job summary
        if: always()
        run: |
          echo "### Collector summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f apps/web/src/data/meta.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat apps/web/src/data/meta.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
