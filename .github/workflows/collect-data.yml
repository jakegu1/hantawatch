name: Collect data (WHO DON + ECDC)

# Runs four times a day, plus on-demand. Times are in UTC.
# 04:00 UTC = 12:00 China time, 16:00 UTC = 00:00 next day China time.
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只抓取不写文件（true/false）'
        required: false
        default: 'false'

permissions:
  contents: write   # 需要 commit & push 数据更新

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install collector
        working-directory: services/collector
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        working-directory: services/collector
        run: pytest -q

      - name: Run collector
        working-directory: services/collector
        # main.py exit codes (see main.py docstring):
        #   0 = all sources OK
        #   1 = fatal — could not even start
        #   2 = partial — one or more sources failed, but valid output was
        #       still written (e.g. ECDC TLS handshake flaked, WHO DON OK)
        #
        # Treat code 2 as success-with-warning: the JSON files on disk are
        # internally consistent (builder.py preserves prior values when a
        # source is empty) and we want the commit & push step to still run
        # so the user sees the data update. Without this special-case, a
        # single ECDC blip every few weeks blocked all auto-updates.
        run: |
          set +e
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Collector ok."
            exit 0
          elif [ "$rc" -eq 2 ]; then
            echo "::warning title=Collector partial failure::main.py returned 2 — one or more sources failed but partial output was written. Continuing to commit & push."
            exit 0
          else
            echo "::error title=Collector fatal failure::main.py returned $rc"
            exit "$rc"
          fi

      - name: Detect changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain apps/web/src/data)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --porcelain apps/web/src/data
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "hantawatch-bot"
          git config user.email "bot@bingduguancha.com"
          git add apps/web/src/data
          git commit -m "chore(data): auto-update from WHO/ECDC $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Job summary
        if: always()
        run: |
          echo "### Collector summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f apps/web/src/data/meta.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat apps/web/src/data/meta.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
