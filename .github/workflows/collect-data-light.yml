name: Collect data (light feeds)

# Hourly refresh of fast-moving sources (news, ProMED/surveillance, realtime).
# Full WHO/ECDC/HPI pipeline remains on collect-data.yml (every 6h).
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只抓取不写文件（true/false）'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: collect-data-light
  cancel-in-progress: false

jobs:
  collect-light:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install collector
        working-directory: services/collector
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run light collector
        working-directory: services/collector
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ secrets.LLM_API_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_THINKING: ${{ secrets.LLM_THINKING }}
        run: |
          set +e
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --feeds-only --dry-run
          else
            python main.py --feeds-only
          fi
          rc=$?
          set -e
          if [ "$rc" -eq 0 ] || [ "$rc" -eq 2 ]; then
            exit 0
          fi
          exit "$rc"

      - name: Commit & push
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "hantawatch-bot"
          git config user.email "bot@bingduguancha.com"
          git add apps/web/src/data/recent-cases-intl.json \
                  apps/web/src/data/realtime-feed.json \
                  apps/web/src/data/country-signals.json \
                  apps/web/src/data/meta.json \
                  apps/web/src/data/daily-brief.json \
                  apps/web/src/data/arcgis-andv-tracking.json
          if git diff --cached --quiet; then
            echo "No light-feed changes."
            exit 0
          fi
          COMMIT_MSG="chore(data): light feeds update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LIGHT_PATHS=(
            apps/web/src/data/recent-cases-intl.json
            apps/web/src/data/realtime-feed.json
            apps/web/src/data/country-signals.json
            apps/web/src/data/meta.json
            apps/web/src/data/daily-brief.json
            apps/web/src/data/arcgis-andv-tracking.json
          )
          git commit -m "$COMMIT_MSG"

          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "::warning title=Push race::Attempt $attempt failed. Replaying light-feed files on latest main."
            git fetch origin main
            BOT_TREE=$(git rev-parse 'HEAD^{tree}')
            git reset --hard origin/main
            git checkout "$BOT_TREE" -- "${LIGHT_PATHS[@]}"
            git add "${LIGHT_PATHS[@]}"
            if git diff --cached --quiet; then
              echo "Light feeds match origin/main after replay; nothing to push."
              exit 0
            fi
            git commit -m "$COMMIT_MSG"
          done
          echo "::error title=Push failed::Could not push after 3 attempts."
          exit 1
